<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けいさんドリル</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root {
    --bg: #fffdf5;
    --primary: #ff6b6b;
    --primary-light: #ffeded;
    --secondary: #4ecdc4;
    --secondary-light: #e8faf9;
    --accent: #ffd93d;
    --accent-dark: #f0c419;
    --text: #3a3a3a;
    --text-light: #888;
    --correct: #6bcb77;
    --wrong: #ff6b6b;
    --card: #ffffff;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,107,0.08) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(78,205,196,0.08) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Kaisei Decol', serif;
    font-size: 2rem;
    color: var(--primary);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }

  .subtitle { color: var(--text-light); font-size: 0.85rem; margin-bottom: 24px; }

  /* ===== SCREENS ===== */
  .screen { width: 100%; max-width: 540px; display: none; }
  .screen.active { display: block; }

  /* ===== START SCREEN ===== */
  .setting-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  .setting-card h2 {
    font-size: 1rem;
    color: var(--text-light);
    margin-bottom: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .level-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .level-btn {
    padding: 14px 10px;
    border: 2.5px solid #e0e0e0;
    border-radius: 14px;
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text-light);
    transition: all 0.18s;
    line-height: 1.4;
  }

  .level-btn .level-label { font-size: 0.72rem; display: block; font-weight: 400; margin-top: 2px; }

  .level-btn:hover { border-color: var(--secondary); color: var(--secondary); }
  .level-btn.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  .op-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .op-btn {
    padding: 14px;
    border: 2.5px solid #e0e0e0;
    border-radius: 14px;
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--text-light);
    transition: all 0.18s;
  }

  .op-btn:hover { border-color: var(--secondary); color: var(--secondary); }
  .op-btn.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  .count-grid {
    display: flex;
    gap: 10px;
  }

  .count-btn {
    flex: 1;
    padding: 12px;
    border: 2.5px solid #e0e0e0;
    border-radius: 14px;
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-light);
    transition: all 0.18s;
  }

  .count-btn:hover { border-color: var(--secondary); color: var(--secondary); }
  .count-btn.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 1.2rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.18s;
    box-shadow: 0 6px 20px rgba(255,107,107,0.35);
  }

  .start-btn:hover {
    background: #e85d5d;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255,107,107,0.4);
  }

  .start-btn:disabled {
    background: #ccc;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* ===== QUIZ SCREEN ===== */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .progress-text { font-size: 0.9rem; color: var(--text-light); font-weight: 700; }

  .progress-bar-wrap {
    height: 8px;
    background: #ebebeb;
    border-radius: 99px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--secondary), var(--primary));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .score-badge {
    background: var(--accent);
    color: #7a5f00;
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 0.85rem;
    font-weight: 800;
  }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 40px 32px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(78,205,196,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .question-num {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }

  .question-text {
    font-size: 3.2rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .question-hint {
    font-size: 0.8rem;
    color: var(--text-light);
    min-height: 1.2em;
  }

  .answer-area {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .answer-input {
    flex: 1;
    padding: 18px 20px;
    border: 2.5px solid #e0e0e0;
    border-radius: 16px;
    font-family: inherit;
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    outline: none;
    transition: border-color 0.18s;
    background: white;
  }

  .answer-input:focus { border-color: var(--secondary); }
  .answer-input.correct-input { border-color: var(--correct); background: #f0fff2; }
  .answer-input.wrong-input { border-color: var(--wrong); background: #fff0f0; }

  .submit-btn {
    padding: 18px 28px;
    background: var(--secondary);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .submit-btn:hover { background: #3bbcb3; transform: translateY(-1px); }

  .feedback-area {
    min-height: 52px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: 800;
    padding: 12px;
    border-radius: 14px;
    transition: all 0.2s;
  }

  .feedback-area.correct {
    background: #f0fff2;
    color: var(--correct);
  }

  .feedback-area.wrong {
    background: #fff0f0;
    color: var(--wrong);
  }

  /* ===== RESULT SCREEN ===== */
  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 40px 32px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 16px;
  }

  .result-emoji { font-size: 4rem; margin-bottom: 12px; }

  .result-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.8rem;
    color: var(--primary);
    margin-bottom: 8px;
  }

  .result-subtitle { color: var(--text-light); font-size: 0.9rem; margin-bottom: 28px; }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-box {
    background: var(--bg);
    border-radius: 14px;
    padding: 16px 8px;
  }

  .stat-num { font-size: 2rem; font-weight: 800; }
  .stat-label { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }

  .stat-box.correct-stat .stat-num { color: var(--correct); }
  .stat-box.wrong-stat .stat-num { color: var(--wrong); }
  .stat-box.total-stat .stat-num { color: var(--secondary); }

  .miss-list {
    text-align: left;
    background: #fff8f8;
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }

  .miss-list h3 {
    font-size: 0.85rem;
    color: var(--wrong);
    margin-bottom: 10px;
    font-weight: 700;
  }

  .miss-item {
    font-size: 0.92rem;
    padding: 6px 0;
    border-bottom: 1px solid #ffe0e0;
    display: flex;
    justify-content: space-between;
  }

  .miss-item:last-child { border-bottom: none; }
  .miss-answer { color: var(--wrong); font-weight: 700; }
  .correct-answer { color: var(--correct); font-weight: 700; }

  .retry-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.18s;
    box-shadow: 0 4px 16px rgba(255,107,107,0.3);
  }

  .retry-btn:hover { background: #e85d5d; transform: translateY(-1px); }

  .back-btn {
    width: 100%;
    padding: 14px;
    background: white;
    color: var(--text-light);
    border: 2px solid #e0e0e0;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }

  .back-btn:hover { border-color: var(--secondary); color: var(--secondary); }

  /* ===== CONGRATS ANIMATION ===== */
  @keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop 0.4s ease forwards; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .shake { animation: shake 0.35s ease; }
</style>
</head>
<body>

<h1>✏️ けいさんドリル</h1>
<p class="subtitle">まいにち少しずつ、かしこくなろう！</p>

<!-- START SCREEN -->
<div class="screen active" id="screen-start">
  <div class="setting-card">
    <h2>📊 レベルをえらぼう</h2>
    <div class="level-grid">
      <button class="level-btn" data-level="1" onclick="selectLevel(1)">
        １けた ＋ １けた
        <span class="level-label">例：5＋3、9－4</span>
      </button>
      <button class="level-btn" data-level="2" onclick="selectLevel(2)">
        くりあがり・くりさがり
        <span class="level-label">例：7＋8、15－9</span>
      </button>
      <button class="level-btn" data-level="3" onclick="selectLevel(3)">
        ２けたの計算
        <span class="level-label">例：23＋45、61－27</span>
      </button>
      <button class="level-btn" data-level="4" onclick="selectLevel(4)">
        ３けたの計算
        <span class="level-label">例：123＋456、302－147</span>
      </button>
    </div>
  </div>

  <div class="setting-card">
    <h2>➕➖ けいさんのしゅるい</h2>
    <div class="op-grid">
      <button class="op-btn" data-op="add" onclick="selectOp('add')">＋ たしざん</button>
      <button class="op-btn" data-op="sub" onclick="selectOp('sub')">－ ひきざん</button>
      <button class="op-btn selected" data-op="both" onclick="selectOp('both')">まざった</button>
    </div>
  </div>

  <div class="setting-card">
    <h2>🔢 もんだいのかず</h2>
    <div class="count-grid">
      <button class="count-btn" data-count="5" onclick="selectCount(5)">5もん</button>
      <button class="count-btn selected" data-count="10" onclick="selectCount(10)">10もん</button>
      <button class="count-btn" data-count="20" onclick="selectCount(20)">20もん</button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>
    レベルをえらんでね 👆
  </button>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <span class="progress-text" id="progress-text">1 / 10</span>
    <span class="score-badge" id="score-badge">⭐ 0もん正解</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="question-card" id="question-card">
    <div class="question-num" id="question-num">もんだい 1</div>
    <div class="question-text" id="question-text">□</div>
    <div class="question-hint" id="question-hint"></div>
  </div>

  <div class="answer-area">
    <input type="number" class="answer-input" id="answer-input"
      placeholder="こたえ" autocomplete="off"
      onkeydown="handleKeydown(event)">
    <button class="submit-btn" onclick="checkAnswer()">こたえる</button>
  </div>

  <div class="feedback-area" id="feedback-area"></div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="screen-result">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">よくできました！</div>
    <div class="result-subtitle" id="result-subtitle"></div>

    <div class="result-stats">
      <div class="stat-box total-stat">
        <div class="stat-num" id="stat-total">10</div>
        <div class="stat-label">もんだい</div>
      </div>
      <div class="stat-box correct-stat">
        <div class="stat-num" id="stat-correct">0</div>
        <div class="stat-label">せいかい ✓</div>
      </div>
      <div class="stat-box wrong-stat">
        <div class="stat-num" id="stat-wrong">0</div>
        <div class="stat-label">まちがい ✗</div>
      </div>
    </div>

    <div class="miss-list" id="miss-list" style="display:none">
      <h3>✗ まちがえたもんだい</h3>
      <div id="miss-items"></div>
    </div>
  </div>

  <button class="retry-btn" onclick="retryQuiz()">もういちど同じせってい ▶</button>
  <button class="back-btn" onclick="goToStart()">せってい画面にもどる</button>
</div>

<script>
  // ===== STATE =====
  let selectedLevel = null;
  let selectedOp = 'both';
  let selectedCount = 10;
  let questions = [];
  let currentIndex = 0;
  let correctCount = 0;
  let missedQuestions = [];
  let answered = false;

  // ===== SETUP =====
  function selectLevel(l) {
    selectedLevel = l;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`.level-btn[data-level="${l}"]`).classList.add('selected');
    updateStartBtn();
  }

  function selectOp(op) {
    selectedOp = op;
    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`.op-btn[data-op="${op}"]`).classList.add('selected');
  }

  function selectCount(c) {
    selectedCount = c;
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`.count-btn[data-count="${c}"]`).classList.add('selected');
  }

  function updateStartBtn() {
    const btn = document.getElementById('start-btn');
    if (selectedLevel) {
      btn.disabled = false;
      btn.textContent = 'スタート！ ▶';
    }
  }

  // ===== QUESTION GENERATION =====
  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function generateQuestion() {
    let a, b, op;
    const useAdd = selectedOp === 'add' || (selectedOp === 'both' && Math.random() < 0.5);
    op = useAdd ? '+' : '-';

    if (selectedLevel === 1) {
      // 1桁、繰り上がりなし
      if (op === '+') { a = rand(1,9); b = rand(1, 9-a); }
      else { a = rand(2,9); b = rand(1, a-1); }
    } else if (selectedLevel === 2) {
      // 繰り上がり・繰り下がりあり
      if (op === '+') {
        a = rand(2,9); b = rand(Math.max(1, 10-a+1), 9);
      } else {
        a = rand(11,18); b = rand(2,9);
        if (a - b < 1) b = a - 1;
      }
    } else if (selectedLevel === 3) {
      // 2桁
      if (op === '+') {
        a = rand(10,89); b = rand(10, 99-a);
      } else {
        a = rand(20,99); b = rand(10, a-10);
      }
    } else {
      // 3桁
      if (op === '+') {
        a = rand(100,799); b = rand(100, 999-a);
      } else {
        a = rand(200,999); b = rand(100, a-100);
      }
    }

    const answer = op === '+' ? a + b : a - b;
    return { text: `${a} ${op === '+' ? '＋' : '－'} ${b} ＝`, a, b, op, answer };
  }

  function generateQuestions(n) {
    const arr = [];
    for (let i = 0; i < n; i++) arr.push(generateQuestion());
    return arr;
  }

  // ===== QUIZ FLOW =====
  function startQuiz() {
    questions = generateQuestions(selectedCount);
    currentIndex = 0;
    correctCount = 0;
    missedQuestions = [];
    showScreen('quiz');
    showQuestion();
  }

  function showQuestion() {
    const q = questions[currentIndex];
    answered = false;

    document.getElementById('progress-text').textContent = `${currentIndex+1} / ${selectedCount}`;
    document.getElementById('progress-bar').style.width = `${(currentIndex / selectedCount) * 100}%`;
    document.getElementById('score-badge').textContent = `⭐ ${correctCount}もん正解`;
    document.getElementById('question-num').textContent = `もんだい ${currentIndex+1}`;
    document.getElementById('question-text').textContent = q.text;
    document.getElementById('question-hint').textContent = '';

    const input = document.getElementById('answer-input');
    input.value = '';
    input.className = 'answer-input';
    input.disabled = false;

    document.getElementById('feedback-area').textContent = '';
    document.getElementById('feedback-area').className = 'feedback-area';

    setTimeout(() => input.focus(), 50);
  }

  function handleKeydown(e) {
    if (e.key === 'Enter') {
      if (answered) {
        nextQuestion();
      } else {
        checkAnswer();
      }
    }
  }

  function checkAnswer() {
    if (answered) return;
    const input = document.getElementById('answer-input');
    const val = input.value.trim();
    if (val === '') return;

    const userAnswer = parseInt(val, 10);
    const q = questions[currentIndex];
    const feedback = document.getElementById('feedback-area');

    answered = true;
    input.disabled = true;

    if (userAnswer === q.answer) {
      correctCount++;
      input.classList.add('correct-input');
      feedback.className = 'feedback-area correct pop';
      feedback.textContent = getCorrectMessage();
      document.getElementById('score-badge').textContent = `⭐ ${correctCount}もん正解`;
    } else {
      input.classList.add('wrong-input');
      feedback.className = 'feedback-area wrong shake';
      feedback.textContent = `おしい！ こたえは ${q.answer} だよ ✗`;
      missedQuestions.push({ question: `${q.a} ${q.op === '+' ? '＋' : '－'} ${q.b}`, yours: userAnswer, correct: q.answer });
    }

    // Auto-advance after 1.5s
    setTimeout(() => nextQuestion(), 1500);
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= selectedCount) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function getCorrectMessage() {
    const msgs = ['せいかい！ ✓', 'すごい！ ✓', 'やったね！ ✓', 'かんぺき！ ✓', 'よくできた！ ✓'];
    return msgs[Math.floor(Math.random() * msgs.length)];
  }

  // ===== RESULT =====
  function showResult() {
    showScreen('result');
    const wrong = selectedCount - correctCount;
    const pct = Math.round((correctCount / selectedCount) * 100);

    document.getElementById('stat-total').textContent = selectedCount;
    document.getElementById('stat-correct').textContent = correctCount;
    document.getElementById('stat-wrong').textContent = wrong;
    document.getElementById('progress-bar').style.width = '100%';

    // Emoji & title
    let emoji, title, sub;
    if (pct === 100) { emoji = '🏆'; title = 'かんぺき！すごい！'; sub = '全問正解！天才だよ！'; }
    else if (pct >= 80) { emoji = '🌟'; title = 'よくできました！'; sub = `${selectedCount}もん中${correctCount}もん正解！`; }
    else if (pct >= 60) { emoji = '😊'; title = 'いいちょうし！'; sub = `もう少し！もう一回チャレンジしてみよう`; }
    else { emoji = '💪'; title = 'がんばれ！'; sub = `まちがえたもんだいをもう一度みてみよう`; }

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-subtitle').textContent = sub;

    // Miss list
    if (missedQuestions.length > 0) {
      const container = document.getElementById('miss-items');
      container.innerHTML = '';
      missedQuestions.forEach(m => {
        const div = document.createElement('div');
        div.className = 'miss-item';
        div.innerHTML = `<span>${m.question} ＝ ?</span><span><span class="miss-answer">あなた: ${m.yours}</span>　<span class="correct-answer">正解: ${m.correct}</span></span>`;
        container.appendChild(div);
      });
      document.getElementById('miss-list').style.display = 'block';
    } else {
      document.getElementById('miss-list').style.display = 'none';
    }
  }

  function retryQuiz() { startQuiz(); }

  function goToStart() { showScreen('start'); }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(`screen-${name}`).classList.add('active');
  }
</script>
</body>
</html>
